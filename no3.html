<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Churi Kine Dibo! 🥺</title>

    <!-- Google Font (Poppins) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css" />
    
    <style>
      body {
        font-family: 'Poppins', sans-serif;
      }
      /* বাটন মুভ করার জন্য পজিশন অ্যাবসোলিউট করা জরুরি */
      #move-random {
        position: absolute;
        transition: 0.2s ease;
      }
      .btn {
        position: relative;
        height: 50px; /* বাটনের জন্য কিছুটা জায়গা রাখা হলো */
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div
        class="tenor-gif-embed"
        data-postid="15195810"
        data-share-method="host"
        data-aspect-ratio="1"
        data-width="100%"
      >
        <a href="https://tenor.com/view/couple-forgive-me-asking-for-forgiveness-begging-crying-gif-15195810">Couple Forgive Me Sticker</a>from
        <a href="https://tenor.com/search/couple-stickers">Couple Stickers</a>
      </div>
      <script type="text/javascript" async src="https://tenor.com/embed.js"></script>

      <h1>Think again, My Madam! 😣</h1>
      <p>Madam Elma, try koro... jani 'No' te tip diba na, 'Yes' dilei tomi amr! 😑💚</p>

      <div class="btn">
        <a href="yes.html">Yes</a>
        <!-- এখানে id="move-random" এবং href="#" করে দেওয়া হলো -->
        <a href="#" id="move-random">No</a>
      </div>
    </div>

    <!-- বাটন মুভ করানোর সরাসরি ম্যাজিক কোড -->
    <script>
      const moveBtn = document.getElementById('move-random');
      
      function moveButton() {
        const x = Math.random() * (window.innerWidth - moveBtn.offsetWidth - 20);
        const y = Math.random() * (window.innerHeight - moveBtn.offsetHeight - 20);
        
        moveBtn.style.left = `${x}px`;
        moveBtn.style.top = `${y}px`;
      }

      // মাউস নিলে বা টাচ করলেই বাটন পালাবে
      moveBtn.addEventListener('mouseenter', moveButton);
      moveBtn.addEventListener('touchstart', function(e) {
        e.preventDefault(); // মোবাইল স্ক্রিনে যাতে পেজ স্ক্রল না হয়ে বাটন পালায়
        moveButton();
      });
    </script>
  </body>
</html>
